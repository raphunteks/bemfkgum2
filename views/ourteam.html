    <link rel="icon" type="image/png" href="/img/bemfkgumi.png">
    <link rel="stylesheet" href="/css/main.css">
    <style>
        /* Tambahan style untuk memastikan loading spinner tampil dengan baik */
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .reveal { opacity: 0; transform: translateY(20px); transition: all 0.6s ease-out; }
        .reveal.active { opacity: 1; transform: translateY(0); }
    </style>
</head>
<body>
    <%- include('partials/header.html') %>
    
    <main class="container" style="padding-top: 60px; min-height: 80vh; padding-bottom: 80px;">
        
        <div class="reveal" style="text-align: center; margin-bottom: 40px;">
            <div class="clay-badge" style="margin-bottom: 15px;">CREDITS</div>
            <h1 style="font-size: 3rem; font-weight: 900;">Developer <span style="color: var(--accent-neon);">Team</span></h1>
            <p style="color: var(--text-muted); margin-top: 10px;">Sosok dibalik layar pengembangan Sistem Informasi BEM KBMFKG UMI.</p>
        </div>

        <div id="teamContainer">
            <div style="text-align:center; padding: 50px; color: var(--text-muted);">
                <div style="width: 40px; height: 40px; border: 4px solid var(--accent-neon); border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 15px;"></div>
                Mensinkronisasi data tim dari server...
            </div>
        </div>

    </main>

    <%- include('partials/footer.html') %>

    <!-- Skrip Logic Aplikasi -->
    <script>
        const FALLBACK_TEAM = [
            { category: "FullStack Development", members: [ { nama: "drg. M. Aksa Arsyad, S.KG", foto: "/img/bemfkgumi.png", ig: "https://www.instagram.com/axaaxyz_01" } ] },
            { category: "Backend Development", members: [ { nama: "Silvy Ananda", foto: "/img/bemfkgumi.png", ig: "https://www.instagram.com/oenandaa" }, { nama: "Muh. Sauqi Zahran. B", foto: "/img/bemfkgumi.png", ig: "https://www.instagram.com/sauqizhran" } ] },
            { category: "Frontend Development", members: [ { nama: "Daegal Fauza Iryanto", foto: "/img/bemfkgumi.png", ig: "https://www.instagram.com/daegalfauzaaa" }, { nama: "Zahwa Alzahra Djohan", foto: "/img/bemfkgumi.png", ig: "https://www.instagram.com/zahwadjohan" } ] },
            { category: "UI/UX Design (CSS)", members: [ { nama: "Zaneta Zahra Zulaikha", foto: "/img/bemfkgumi.png", ig: "https://www.instagram.com/zanetazahraa" }, { nama: "Novita Widyantari", foto: "/img/bemfkgumi.png", ig: "https://www.instagram.com/novvwdyn__" } ] }
        ];

        document.addEventListener('DOMContentLoaded', async () => {
            document.querySelectorAll('.reveal').forEach(el => el.classList.add('active'));
            try {
                let apiUrl = '/api/content';
                if(window.location.protocol === 'blob:' || window.location.origin === "null") apiUrl = 'https://bemfkgumi.vercel.app/api/content';
                
                const req = await fetch(apiUrl);
                if (!req.ok) throw new Error("API Gagal");
                const res = await req.json();
                
                if (res.team && res.team.length > 0) {
                    renderTeamUI(res.team);
                } else {
                    renderTeamUI(FALLBACK_TEAM);
                }
            } catch (err) { 
                console.warn("Memuat mode statis."); 
                renderTeamUI(FALLBACK_TEAM);
            }
        });

        function renderTeamUI(teamData) {
            const cont = document.getElementById('teamContainer');
            cont.innerHTML = '';

            teamData.forEach((cat, index) => {
                const delay = index * 0.2;
                let html = `
                    <div class="team-cat-header reveal active" style="animation-delay: ${delay}s">
                        <div class="team-cat-icon">
                            <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm-5 14H4v-4h11v4zm0-5H4V9h11v4zm5 5h-4V9h4v9z"/></svg>
                        </div>
                        <h2 class="team-cat-title">${cat.category}</h2>
                    </div>
                    <div class="team-grid-cards reveal active" style="animation-delay: ${delay + 0.1}s">
                `;

                if(cat.members) {
                    cat.members.forEach(m => {
                        const igLink = m.ig || '#';
                        const profPic = m.foto || '/img/bemfkgumi.png';
                        
                        // SUPER BIG UPGRADE: Validasi Dinamis Khusus "drg. M. Aksa Arsyad, S.KG"
                        let roleTeks = "Fakultas Kedokteran Gigi UMI";
                        let deptTeks = "Dept. Information and Communication";
                        
                        // Jika mendeteksi nama tersebut (menggunakan includes agar lebih aman), maka ubah departemennya
                        if(m.nama.includes("Aksa Arsyad") || m.nama.includes("drg. M. Aksa")) {
                            deptTeks = "Demisioner Dept. Information and Communication";
                        }
                        
                        html += `
                            <div class="team-card">
                                <div class="team-avatar-wrapper">
                                    <img src="${profPic}" alt="${m.nama}" class="team-avatar">
                                </div>
                                <h3 class="team-name">${m.nama}</h3>
                                <p class="team-role">${roleTeks}</p>
                                <p class="team-dept">${deptTeks}</p>
                                
                                <div class="team-social-box">
                                    <a href="${igLink}" target="_blank" class="team-social-icon" title="Instagram">
                                        <svg viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/></svg>
                                    </a>
                                </div>
                            </div>
                        `;
                    });
                }
                
                html += `</div>`;
                cont.innerHTML += html;
            });
        }
    </script>

    <!-- Upgrade: Integrasi sistem proteksi devtools -->
    <script src="/js/protect-devtools.js"></script>
</body>
</html>
